<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💌 Thiệp 8/3 Đặc Biệt</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    /* ── RESET ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      max-width: 100vw;
      font-family: 'Nunito', sans-serif;
      background: #0a0010;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── LAYERS ── */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #bg-particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    #fw-cnv {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 500;
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      transition: opacity .55s ease, transform .55s ease;
    }

    .screen.off {
      opacity: 0;
      pointer-events: none;
      transform: scale(.95);
    }

    /* ════════════ PIN ════════════ */
    #s-pin {
      background: radial-gradient(ellipse at 50% 60%, #2a0040 0%, #0a0010 70%);
    }

    .pin-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 310px;
    }

    .pin-logo {
      font-size: 3rem;
      animation: bob 2s ease infinite;
    }

    @keyframes bob {

      0%,
      100% {
        transform: translateY(0) rotate(-5deg)
      }

      50% {
        transform: translateY(-10px) rotate(5deg)
      }
    }

    .pin-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.3rem, 5vw, 1.8rem);
      color: #ffb3d4;
      text-align: center;
      text-shadow: 0 0 20px rgba(255, 150, 200, .5);
    }

    .pin-sub {
      font-size: .78rem;
      color: rgba(255, 180, 210, .55);
      text-align: center;
      margin-bottom: 4px;
    }

    .pin-dots {
      display: flex;
      gap: 14px;
      margin: 6px 0 10px;
    }

    .dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: rgba(255, 150, 180, .15);
      border: 2px solid rgba(255, 150, 180, .3);
      transition: all .2s;
    }

    .dot.on {
      background: #ff6eb5;
      border-color: #ff6eb5;
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(255, 110, 181, .6);
    }

    .dot.err {
      background: #ff4444;
      border-color: #ff2222;
      animation: dshake .3s ease;
    }

    @keyframes dshake {

      0%,
      100% {
        transform: translateX(0)
      }

      30% {
        transform: translateX(-5px)
      }

      70% {
        transform: translateX(5px)
      }
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      width: 100%;
    }

    .key {
      height: 54px;
      border-radius: 16px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .1s;
      -webkit-tap-highlight-color: transparent;
    }

    .key:active {
      transform: scale(.88);
    }

    .kn {
      background: linear-gradient(145deg, rgba(255, 255, 255, .11), rgba(255, 255, 255, .05));
      color: #fff;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .4), inset 0 1px 0 rgba(255, 255, 255, .1);
    }

    .kd {
      background: linear-gradient(145deg, rgba(255, 100, 150, .25), rgba(255, 100, 150, .15));
      color: #ff9ec8;
    }

    .k0 {
      grid-column: 2;
    }

    .kc {
      background: rgba(255, 255, 255, .04);
      color: rgba(255, 180, 210, .4);
      font-size: .78rem;
    }

    .pin-hint {
      font-size: .7rem;
      color: rgba(255, 150, 180, .3);
      text-align: center;
      margin-top: 4px;
      line-height: 1.7;
    }

    /* ════════════ HOLD ════════════ */
    #s-hold {
      background: radial-gradient(ellipse at 50% 50%, #1a0030 0%, #0a0010 70%);
    }

    .hold-badge {
      padding: 6px 20px;
      background: linear-gradient(135deg, rgba(255, 110, 181, .25), rgba(192, 132, 252, .25));
      border: 1px solid rgba(255, 110, 181, .35);
      border-radius: 50px;
      font-size: .85rem;
      font-weight: 700;
      color: #ffb3d4;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    .hold-emo {
      font-size: 3.8rem;
      animation: bob 2.5s ease infinite;
      margin-bottom: 10px;
    }

    .hold-lbl {
      font-family: 'Dancing Script', cursive;
      font-size: 1.15rem;
      color: rgba(255, 180, 210, .65);
      margin-bottom: 22px;
    }

    .ring-wrap {
      position: relative;
      width: 100px;
      height: 100px;
    }

    #ring-cnv {
      position: absolute;
      top: -6px;
      left: -6px;
      width: 112px;
      height: 112px;
    }

    .hold-btn {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #ff6eb5, #c084fc);
      cursor: pointer;
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 24px rgba(255, 110, 181, .5);
      transition: transform .12s;
      -webkit-tap-highlight-color: transparent;
    }

    .hold-btn:active {
      transform: scale(.9);
    }

    .hold-pct {
      margin-top: 18px;
      font-family: 'Dancing Script', cursive;
      font-size: 1rem;
      color: #ff9ec8;
      min-height: 22px;
      text-align: center;
    }

    /* ════════════ GIFT ════════════ */
    #s-gift {
      padding: 0;
      background: transparent;
      overflow: hidden;
      max-width: 100vw;
    }

    .scene {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .7s;
      overflow: hidden;
    }

    .scene.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ── FLOAT SCENE ── */
    #sc-float {
      background: radial-gradient(ellipse at 50% 50%, #170026 0%, #07000e 100%);
      overflow: hidden;
    }

    .fp {
      position: absolute;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 6px 28px rgba(255, 100, 180, .3);
      border: 2px solid rgba(255, 150, 200, .25);
      cursor: pointer;
      max-width: 38vw;
    }

    @keyframes riseLoop {
      0% {
        opacity: 0;
        transform: translateY(110vh) rotate(var(--r)) scale(.7);
      }

      8% {
        opacity: 1;
      }

      92% {
        opacity: .9;
      }

      100% {
        opacity: 0;
        transform: translateY(-115vh) rotate(var(--r)) scale(.85);
      }
    }

    .fp:hover {
      border-color: rgba(255, 150, 200, .7);
      box-shadow: 0 0 24px rgba(255, 100, 180, .6);
    }

    /* ── SPHERE SCENE ── */
    #sc-sphere {
      background: radial-gradient(ellipse at 50% 50%, #0d001a 0%, #03000a 100%);
      perspective: 1000px;
    }

    .sphere-ui {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
      justify-content: center;
    }

    /* 3D Sphere Container */
    .sphere-3d-wrap {
      position: relative;
      width: min(70vw, 320px);
      height: min(70vw, 320px);
      cursor: pointer;
      transition: transform 0.6s cubic-bezier(.34, 1.56, .64, 1), opacity 0.5s;
    }

    .sphere-3d-wrap:hover {
      transform: scale(1.05);
    }

    .sphere-3d-wrap.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.3);
      position: absolute;
    }

    .sphere-3d {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: sphereSpin 12s linear infinite;
    }

    .sphere-3d-wrap:hover .sphere-3d {
      animation-play-state: paused;
    }

    @keyframes sphereSpin {
      0% {
        transform: rotateY(0deg) rotateX(5deg);
      }

      100% {
        transform: rotateY(360deg) rotateX(5deg);
      }
    }

    .sphere-tile {
      position: absolute;
      width: 70px;
      height: 70px;
      left: 50%;
      top: 50%;
      margin-left: -35px;
      margin-top: -35px;
      border-radius: 6px;
      overflow: hidden;
      backface-visibility: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .5);
      border: 1.5px solid rgba(255, 150, 200, .25);
    }

    .sphere-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .sphere-tile .tile-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
    }

    /* Sphere glow effect */
    .sphere-glow {
      position: absolute;
      inset: -15%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 110, 181, .12) 0%, rgba(192, 132, 252, .08) 40%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    /* Sphere click hint */
    .sphere-click-hint {
      position: absolute;
      bottom: -36px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Dancing Script', cursive;
      font-size: clamp(.85rem, 2.5vw, 1rem);
      color: rgba(255, 180, 210, .6);
      white-space: nowrap;
      animation: pulseHint 2s ease infinite;
    }

    @keyframes pulseHint {

      0%,
      100% {
        opacity: .6;
      }

      50% {
        opacity: 1;
      }
    }

    /* Exploded Grid */
    .sphere-grid {
      display: none;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      max-width: min(90vw, 520px);
      max-height: 70vh;
      overflow-y: auto;
      padding: 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 110, 181, .3) transparent;
    }

    .sphere-grid.show {
      display: flex;
      animation: gridFadeIn 0.5s ease;
    }

    @keyframes gridFadeIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .grid-photo {
      width: calc(33% - 8px);
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid rgba(255, 150, 200, .2);
      box-shadow: 0 4px 18px rgba(255, 100, 180, .2);
      transition: transform .25s cubic-bezier(.34, 1.56, .64, 1), box-shadow .25s, border-color .25s;
      position: relative;
    }

    .grid-photo:hover {
      transform: scale(1.08);
      border-color: rgba(255, 150, 200, .6);
      box-shadow: 0 6px 28px rgba(255, 100, 180, .5);
      z-index: 5;
    }

    .grid-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .grid-photo .grid-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      background: rgba(255, 255, 255, .04);
    }

    /* Explode animation for each photo */
    .grid-photo.exploding {
      animation: explodeIn 0.7s cubic-bezier(.34, 1.56, .64, 1) forwards;
    }

    @keyframes explodeIn {
      0% {
        transform: scale(0) rotate(30deg);
        opacity: 0;
      }

      60% {
        transform: scale(1.1) rotate(-3deg);
        opacity: 1;
      }

      100% {
        transform: scale(1) rotate(0);
        opacity: 1;
      }
    }

    /* Back to sphere button */
    .back-sphere-btn {
      margin-top: 14px;
      padding: 10px 24px;
      background: linear-gradient(135deg, rgba(255, 110, 181, .25), rgba(192, 132, 252, .25));
      border: 1px solid rgba(255, 110, 181, .3);
      border-radius: 50px;
      color: #ffb3d4;
      font-weight: 700;
      font-size: .82rem;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: transform .15s, background .3s;
      display: none;
    }

    .back-sphere-btn.show {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .back-sphere-btn:hover {
      background: linear-gradient(135deg, rgba(255, 110, 181, .4), rgba(192, 132, 252, .4));
      transform: scale(1.05);
    }

    .sphere-hint {
      margin-top: 10px;
      font-family: 'Dancing Script', cursive;
      font-size: clamp(.85rem, 2.5vw, 1rem);
      color: rgba(255, 180, 210, .6);
    }

    .sphere-upload-btn {
      margin-top: 10px;
      padding: 8px 20px;
      background: linear-gradient(135deg, rgba(255, 110, 181, .25), rgba(192, 132, 252, .25));
      border: 1px solid rgba(255, 110, 181, .3);
      border-radius: 50px;
      color: #ffb3d4;
      font-weight: 700;
      font-size: .78rem;
      cursor: pointer;
    }

    /* ── LETTER SCENE ── */
    #sc-letter {
      background: radial-gradient(ellipse at 50% 40%, #1a0028 0%, #08000f 100%);
      overflow-y: auto;
      padding: 28px 16px 72px;
      justify-content: flex-start;
    }

    .letter-card {
      width: min(460px, 96vw);
      background: rgba(255, 255, 255, .04);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 150, 200, .14);
      border-radius: 22px;
      padding: clamp(22px, 5vw, 34px) clamp(18px, 5vw, 30px);
      position: relative;
    }

    .bfly {
      position: absolute;
      font-size: 1.7rem;
    }

    .bfly.L {
      top: -13px;
      left: 14px;
      animation: bfL 1.5s ease infinite;
    }

    .bfly.R {
      top: -13px;
      right: 14px;
      animation: bfR 1.5s .3s ease infinite;
    }

    @keyframes bfL {

      0%,
      100% {
        transform: scaleX(1) rotate(-5deg)
      }

      50% {
        transform: scaleX(.65) rotate(5deg)
      }
    }

    @keyframes bfR {

      0%,
      100% {
        transform: scaleX(-1) rotate(-5deg)
      }

      50% {
        transform: scaleX(-.65) rotate(5deg)
      }
    }

    .ltr-to {
      font-family: 'Dancing Script', cursive;
      font-size: 1.1rem;
      color: #ff9ec8;
      margin-bottom: 12px;
    }

    .ltr-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.5rem, 5vw, 2.1rem);
      color: #ffb3d4;
      margin-bottom: 14px;
      text-align: center;
      text-shadow: 0 0 18px rgba(255, 150, 200, .4);
    }

    .ltr-body {
      font-size: clamp(.88rem, 2.7vw, .98rem);
      color: rgba(255, 220, 235, .88);
      line-height: 1.9;
    }

    .ltr-deco {
      display: flex;
      justify-content: center;
      gap: 10px;
      font-size: 1.4rem;
      margin: 16px 0 6px;
    }

    .ltr-from {
      font-family: 'Dancing Script', cursive;
      font-size: 1rem;
      color: #c084fc;
      text-align: right;
      margin-top: 10px;
    }

    .ltr-photo {
      margin: 14px auto;
      width: min(240px, 78%);
      aspect-ratio: 4/3;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid rgba(255, 150, 200, .2);
      box-shadow: 0 6px 28px rgba(200, 80, 160, .18);
      cursor: pointer;
      position: relative;
      background: rgba(255, 255, 255, .04);
    }

    .ltr-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .ltr-photo img.ld {
      display: block;
    }

    .ltr-ph {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: rgba(255, 150, 180, .45);
      font-family: 'Dancing Script', cursive;
      font-size: .88rem;
    }

    .ltr-ph-ico {
      font-size: 1.9rem;
    }

    .ltr-ph.gone {
      display: none;
    }

    .ltr-photo input {
      display: none;
    }

    /* ── NAV ── */
    .scene-nav {
      position: fixed;
      bottom: clamp(10px, 3vh, 18px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 100;
    }

    .snd {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .18);
      cursor: pointer;
      transition: all .3s;
    }

    .snd.on {
      background: #ff6eb5;
      width: 20px;
      border-radius: 4px;
      box-shadow: 0 0 8px rgba(255, 110, 181, .5);
    }

    .next-btn {
      position: fixed;
      bottom: clamp(32px, 6vh, 46px);
      right: clamp(10px, 3vw, 18px);
      z-index: 100;
      padding: 9px 18px;
      background: linear-gradient(135deg, #ff6eb5, #c084fc);
      border: none;
      border-radius: 50px;
      color: #fff;
      font-weight: 700;
      font-size: clamp(.78rem, 2.5vw, .88rem);
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255, 110, 181, .38);
      transition: transform .15s;
      display: none;
    }

    .next-btn.show {
      display: block;
    }

    .next-btn:active {
      transform: scale(.92);
    }

    /* Upload bar for float scene */
    .float-bar {
      position: absolute;
      bottom: clamp(60px, 12vh, 80px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      align-items: center;
      z-index: 20;
      white-space: nowrap;
    }

    .float-up-btn {
      padding: 8px 18px;
      border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: clamp(.72rem, 2.5vw, .82rem);
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── LIGHTBOX ── */
    #lb {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(0, 0, 0, .94);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      cursor: pointer;
    }

    #lb.open {
      display: flex;
    }

    #lb-inner {
      position: relative;
      max-width: min(94vw, 480px);
      max-height: 90vh;
      animation: lbpop .3s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes lbpop {
      from {
        transform: scale(.4) rotate(-5deg);
        opacity: 0
      }

      to {
        transform: none;
        opacity: 1
      }
    }

    #lb-img {
      width: 100%;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(255, 120, 180, .3);
      display: block;
    }

    #lb-close {
      position: absolute;
      top: -12px;
      right: -12px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6eb5, #c084fc);
      border: none;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 12px rgba(200, 80, 140, .4);
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(25, 0, 45, .92);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 100, 180, .22);
      padding: 9px 22px;
      border-radius: 50px;
      font-size: .83rem;
      font-weight: 700;
      color: #ff9ec8;
      box-shadow: 0 4px 20px rgba(200, 80, 160, .25);
      transition: transform .4s cubic-bezier(.34, 1.56, .64, 1);
      z-index: 1500;
      white-space: nowrap;
      pointer-events: none;
    }

    #toast.on {
      transform: translateX(-50%) translateY(0);
    }

    /* ── CLICK HEART ── */
    .ch {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      animation: hpop 1.1s ease forwards;
    }

    @keyframes hpop {
      0% {
        transform: translateY(0) scale(0);
        opacity: 1
      }

      60% {
        opacity: .85
      }

      100% {
        transform: translateY(-110px) scale(.45);
        opacity: 0
      }
    }

    /* ── MUSIC ── */
    #mus {
      position: fixed;
      bottom: clamp(80px, 13vh, 100px);
      right: clamp(10px, 3vw, 16px);
      z-index: 800;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6eb5, #c084fc);
      border: none;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;

      }

      50% {
        box-shadow: 0 3px 28px rgba(255, 110, 181, .7), 0 0 40px rgba(192, 132, 252, .4)
      }
    }
  </style>
</head>

  <script>
    // ═══════════════════════════════
    // PERSONS CONFIG
    // ═══════════════════════════════
    const PERSONS = {
      '0308': {
        key: 'me', name: '💗 Mẹ', emoji: '🌹', badge: '💗 Mẹ',
        to: '💌 Gửi Mẹ yêu dấu,', title: "Happy Women's Day! 💗",
        body: `Nhân ngày Quốc tế Phụ nữ 8/3,\ncon muốn gửi đến <b>Mẹ</b> lời chúc từ tận đáy lòng 🥹\n\nMẹ là người phụ nữ <b>tuyệt vời nhất</b> trong cuộc đời con.\nCảm ơn Mẹ đã luôn yêu thương, hi sinh và che chở.\nMỗi nụ cười của Mẹ là <b>ánh sáng</b> của cả gia đình 🌟\n\nCon chúc Mẹ luôn <b>mạnh khỏe</b>, tươi trẻ và hạnh phúc! 💕`,
        from: '— Con yêu Mẹ nhiều lắm! ❤️ —', deco: '🌹💗🌸', slot: 'me',
        colors: ['#ff6eb5', '#ff4d94', '#c084fc', '#ff85a6', '#ffb3d4']
      },
      '0803': {
        key: 'ca', name: '🌸 Chị Cả', emoji: '🌸', badge: '🌸 Chị Cả',
        to: '💌 Gửi Chị Cả thân thương,', title: "Happy Women's Day! 🌸",
        body: `Nhân ngày 8/3 đặc biệt này,\nem muốn gửi đến <b>Chị Cả</b> thật nhiều yêu thương 💜\n\nChị là người chị <b>dịu dàng, ấm áp</b> và luôn quan tâm em.\nCảm ơn chị đã luôn ở bên, lắng nghe và động viên em 🌸\n\nEm chúc chị luôn <b>xinh đẹp</b> như hoa mùa xuân,\nthành công và <b>hạnh phúc</b> mãi mãi! ✨`,
        from: '— Em yêu Chị nhiều! 💜 —', deco: '🌸💜🦋', slot: 'ca',
        colors: ['#c084fc', '#a855f7', '#e879f9', '#d8b4fe', '#f3e8ff']
      },
      '1234': {
        key: 'hai', name: '🌻 Chị Hai', emoji: '🌻', badge: '🌻 Chị Hai',
        to: '💌 Gửi Chị Hai vui tính,', title: "Happy Women's Day! 🌻",
        body: `Ngày 8/3 này em gửi đến <b>Chị Hai</b>\nmột thiệp nhỏ đầy yêu thương 🧡\n\nChị là người chị <b>năng động, vui vẻ</b> và rực rỡ,\nluôn mang lại tiếng cười cho cả nhà ☀️\n\nEm chúc chị luôn <b>tươi vui</b> như nắng sớm,\nngập tràn niềm vui và được <b>yêu thương</b> mãi! 🌟`,
        from: '— Em yêu Chị nhiều! 🧡 —', deco: '🌻🧡☀️', slot: 'hai',
        colors: ['#f59e0b', '#f97316', '#ef4444', '#fcd34d', '#fef3c7']
      },
    };
    let CP = null; // currentPerson
    let currentScene = 0;
    // Per-person photo banks
    const FLOAT_BANK = { me: [], ca: [], hai: [] };
    const SPHERE_BANK = { me: [], ca: [], hai: [] };

    // ═══════════════════════════════
    // IMAGE FILES CONFIG
    // Bỏ ảnh vào folder images/me/, images/ca/, images/hai/
    // Rồi liệt kê tên file ở đây
    // Ví dụ: ['anh1.jpg', 'anh2.png', 'photo3.jpeg']
    // ═══════════════════════════════
    const IMAGE_FILES = {
      me: ['3 (1).jpg', '3 (2).jpg', '3 (3).jpg', '3 (4).jpg', '3 (5).jpg',
 '3 (6).jpg', '3 (7).jpg', '3 (8).jpg', '3 (9).jpg', '3 (10).jpg',
 '3 (11).jpg', '3 (12).jpg', '3 (13).jpg', '3 (14).jpg', '3 (15).jpg',
 '3 (16).jpg', '3 (17).jpg', '3 (18).jpg', '3 (19).jpg', '3 (20).jpg',
 '3 (21).jpg', '3 (22).jpg', '3 (23).jpg'],
      ca: ['1 (1).jpg', '1 (2).jpg', '1 (3).jpg', '1 (4).jpg', '1 (5).jpg',
        '1 (6).jpg', '1 (7).jpg', '1 (8).jpg', '1 (9).jpg', '1 (10).jpg',
        '1 (11).jpg', '1 (12).jpg', '1 (13).jpg', '1 (14).jpg', '1 (15).jpg',
        '1 (16).jpg', '1 (17).jpg', '1 (18).jpg', '1 (19).jpg', '1 (20).jpg',
        '1 (21).jpg', '1 (22).jpg', '1 (23).jpg', '1 (24).jpg', '1 (25).jpg'],
      hai: ['2 (1).jpg', '2 (2).jpg', '2 (3).jpg', '2 (4).jpg', '2 (5).jpg',
        '2 (6).jpg', '2 (7).jpg', '2 (8).jpg', '2 (9).jpg', '2 (10).jpg',
        '2 (11).jpg', '2 (12).jpg', '2 (13).jpg', '2 (14).jpg', '2 (15).jpg',
        '2 (16).jpg', '2 (17).jpg', '2 (18).jpg', '2 (19).jpg', '2 (20).jpg',
        '2 (21).jpg', '2 (22).jpg', '2 (23).jpg', '2 (24).jpg', '2 (25).jpg',
        '2 (26).jpg', '2 (27).jpg', '2 (28).jpg', '2 (29).jpg']
    };

    // ═══════════════════════════════
    // MUSIC FILES CONFIG
    // Bỏ file nhạc vào folder music/
    // Hỗ trợ: .mp3, .ogg, .wav, .m4a
    // ═══════════════════════════════
    const MUSIC_FILE = 'snaptik.vn_TB014.mp3'; // Ví dụ: 'nhac-nen.mp3'

    // ═══════════════════════════════
    // LETTER PHOTO CONFIG
    // Chỉ định ảnh chính hiển thị trong thiệp cho từng người
    // Để trống '' sẽ tự động lấy ảnh đầu tiên
    // ═══════════════════════════════
    const LETTER_PHOTO = {
      me: '3 (1).jpg',    // Ảnh cho Mẹ
      ca: '1 (20).jpg',    // Ảnh cho Chị Cả
      hai: '2 (1).jpg'    // Ảnh cho Chị Hai
    };

    // Auto-load images from folders on init
    function preloadFolderImages(personKey) { 
      const files = IMAGE_FILES[personKey];
      if (!files || files.length === 0) return;
      files.forEach(filename => {
        const src = `images/${personKey}/${filename}`;
        // Check if already loaded
        if (FLOAT_BANK[personKey].includes(src)) return;
        FLOAT_BANK[personKey].push(src);
        SPHERE_BANK[personKey].push(src);
      });
    }

    // ═══════════════════════════════
    // STARFIELD
    // ═══════════════════════════════
    const sc = document.getElementById('starfield'), sx = sc.getContext('2d');
    let stars = [];
    function initStars() {
      sc.width = innerWidth; sc.height = innerHeight; stars = [];
      for (let i = 0; i < 220; i++) stars.push({ x: Math.random() * sc.width, y: Math.random() * sc.height, r: Math.random() * 1.4 + .3, ph: Math.random() * 6.28, sp: Math.random() * .005 + .001, sq: i % 22 === 0 });
    }
    function drawStars() {
      sx.clearRect(0, 0, sc.width, sc.height);
      const t = Date.now() * .001;
      stars.forEach(s => {
        const a = .15 + .85 * Math.abs(Math.sin(t * s.sp * 55 + s.ph));
        if (s.sq) {// pink square like reference
          sx.globalAlpha = a * .4; sx.fillStyle = '#ff60b0'; sx.fillRect(s.x - 2, s.y - 2, 4, 4);
        } else {
          sx.globalAlpha = a; sx.beginPath(); sx.arc(s.x, s.y, s.r, 0, 6.28); sx.fillStyle = 'rgba(255,220,240,1)'; sx.fill();
        }
      });
      sx.globalAlpha = 1; requestAnimationFrame(drawStars);
    }
    window.addEventListener('resize', initStars);
    initStars(); drawStars();

    // ═══════════════════════════════
    // PARTICLES (click/touch burst)
    // ═══════════════════════════════
    const pc = document.getElementById('particles'), px = pc.getContext('2d');
    let parts = [];
    function initPC() { pc.width = innerWidth; pc.height = innerHeight; }
    function spawnPart(x, y, c) {
      for (let i = 0; i < 5; i++) { const a = Math.random() * 6.28, s = Math.random() * 3 + 1; parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1.5, l: 1, r: Math.random() * 3 + .8, c }); }
    }
    function animPC() {
      px.clearRect(0, 0, pc.width, pc.height);
      parts = parts.filter(p => p.l > 0);
      parts.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += .06; p.l -= .018; px.globalAlpha = p.l; px.beginPath(); px.arc(p.x, p.y, p.r, 0, 6.28); px.fillStyle = p.c; px.fill(); });
      px.globalAlpha = 1; requestAnimationFrame(animPC);
    }
    window.addEventListener('resize', initPC);
    initPC(); animPC();
    setInterval(() => { if (!CP) return; spawnPart(Math.random() * innerWidth, innerHeight + 10, CP.colors[Math.floor(Math.random() * CP.colors.length)]); }, 140);

    // ═══════════════════════════════
    // AMBIENT BG PARTICLES (always on)
    // ═══════════════════════════════
    const bgc = document.getElementById('bg-particles'), bgx = bgc.getContext('2d');
    let bgParts = [];
    const BG_COLORS = ['#ff6eb5', '#c084fc', '#ff85a6', '#e879f9', '#fbbf24', '#ffb3d4', '#a78bfa', '#f472b6', '#fcd34d', '#818cf8'];
    const BG_MAX = 120;

    function initBGC() { bgc.width = innerWidth; bgc.height = innerHeight; }

    function spawnBGPart() {
      const type = Math.random();
      const col = CP ? CP.colors[Math.floor(Math.random() * CP.colors.length)] : BG_COLORS[Math.floor(Math.random() * BG_COLORS.length)];
      if (type < 0.45) {
        // Floating glow dot - rises up
        bgParts.push({
          kind: 'dot',
          x: Math.random() * bgc.width,
          y: bgc.height + Math.random() * 40,
          vx: (Math.random() - .5) * .35,
          vy: -(Math.random() * .6 + .2),
          r: Math.random() * 2.5 + .8,
          glow: Math.random() * 8 + 4,
          l: 1,
          decay: Math.random() * .0008 + .0004,
          ph: Math.random() * 6.28,
          psp: Math.random() * .02 + .008,
          c: col
        });
      } else if (type < 0.75) {
        // Sparkle - small blink
        bgParts.push({
          kind: 'sparkle',
          x: Math.random() * bgc.width,
          y: Math.random() * bgc.height,
          vx: (Math.random() - .5) * .1,
          vy: -(Math.random() * .15 + .05),
          r: Math.random() * 1.8 + .5,
          l: 1,
          decay: Math.random() * .003 + .001,
          ph: Math.random() * 6.28,
          psp: Math.random() * .06 + .03,
          c: col
        });
      } else {
        // Soft orb - large faint glow drifting
        bgParts.push({
          kind: 'orb',
          x: Math.random() * bgc.width,
          y: bgc.height + Math.random() * 60,
          vx: (Math.random() - .5) * .2,
          vy: -(Math.random() * .4 + .15),
          r: Math.random() * 18 + 8,
          l: 1,
          decay: Math.random() * .0005 + .0002,
          ph: Math.random() * 6.28,
          psp: Math.random() * .01 + .004,
          c: col
        });
      }
    }

    function animBG() {
      bgx.clearRect(0, 0, bgc.width, bgc.height);
      const t = performance.now() * .001;

      // Spawn new particles to maintain count
      while (bgParts.length < BG_MAX) spawnBGPart();

      bgParts = bgParts.filter(p => p.l > 0 && p.y > -60);

      bgParts.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.l -= p.decay;

        // Slight horizontal drift (sinusoidal)
        p.x += Math.sin(t * p.psp * 10 + p.ph) * 0.15;

        const pulse = 0.5 + 0.5 * Math.sin(t * p.psp * 20 + p.ph);

        if (p.kind === 'dot') {
          // Glowing dot
          const alpha = p.l * pulse * 0.7;
          bgx.save();
          bgx.globalAlpha = Math.min(alpha, 0.8);
          bgx.shadowBlur = p.glow;
          bgx.shadowColor = p.c;
          bgx.beginPath();
          bgx.arc(p.x, p.y, p.r, 0, 6.28);
          bgx.fillStyle = p.c;
          bgx.fill();
          bgx.restore();
        } else if (p.kind === 'sparkle') {
          // 4-point star sparkle
          const alpha = p.l * pulse;
          bgx.save();
          bgx.globalAlpha = Math.min(alpha, 0.9);
          bgx.translate(p.x, p.y);
          bgx.rotate(t * p.psp * 5 + p.ph);
          const s = p.r * (0.6 + pulse * 0.4);
          bgx.beginPath();
          bgx.moveTo(0, -s * 2.5);
          bgx.lineTo(s * .3, 0);
          bgx.lineTo(0, s * 2.5);
          bgx.lineTo(-s * .3, 0);
          bgx.closePath();
          bgx.fillStyle = p.c;
          bgx.fill();
          bgx.beginPath();
          bgx.moveTo(-s * 2.5, 0);
          bgx.lineTo(0, s * .3);
          bgx.lineTo(s * 2.5, 0);
          bgx.lineTo(0, -s * .3);
          bgx.closePath();
          bgx.fill();
          bgx.restore();
        } else {
          // Soft orb
          const alpha = p.l * pulse * 0.15;
          bgx.save();
          bgx.globalAlpha = Math.min(alpha, 0.2);
          const grad = bgx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
          grad.addColorStop(0, p.c);
          grad.addColorStop(0.5, p.c + '66');
          grad.addColorStop(1, 'transparent');
          bgx.fillStyle = grad;
          bgx.beginPath();
          bgx.arc(p.x, p.y, p.r, 0, 6.28);
          bgx.fill();
          bgx.restore();
        }
      });

      bgx.globalAlpha = 1;
      requestAnimationFrame(animBG);
    }

    window.addEventListener('resize', initBGC);
    initBGC();
    // Seed initial particles
    for (let i = 0; i < BG_MAX; i++) {
      spawnBGPart();
      // Scatter initial positions across screen
      bgParts[i].y = Math.random() * bgc.height;
    }
    animBG();

    // ═══════════════════════════════
    // PIN
    // ═══════════════════════════════
    let pv = '';
    function kp(d) { if (pv.length >= 4) return; pv += d; syncDots(); if (pv.length === 4) setTimeout(checkPin, 220); }
    function kpD() { pv = pv.slice(0, -1); syncDots(); }
    function kpC() { pv = ''; syncDots(); }
    function syncDots() { for (let i = 0; i < 4; i++) { const d = document.getElementById('d' + i); d.className = 'dot' + (i < pv.length ? ' on' : ''); } }
    function checkPin() {
      const p = PERSONS[pv];
      if (p) { CP = p; showToast(`Chào ${p.name}! 🎉`); setTimeout(showHold, 600); }
      else { for (let i = 0; i < 4; i++)document.getElementById('d' + i).className = 'dot err'; showToast('Sai mật khẩu! Thử lại 😅'); setTimeout(() => { pv = ''; syncDots(); }, 600); }
    }
    function showHold() {
      document.getElementById('h-badge').textContent = CP.badge;
      document.getElementById('h-emo').textContent = CP.emoji;
      switchScreen('s-hold');
    }

    // ═══════════════════════════════
    // HOLD
    // ═══════════════════════════════
    const rc = document.getElementById('ring-cnv'), rx = rc.getContext('2d');
    const holdBtn = document.getElementById('hold-btn');
    let hActive = false, hProg = 0, hRAF = null;
    function drawRing(p) {
      rx.clearRect(0, 0, 112, 112);
      rx.beginPath(); rx.arc(56, 56, 46, 0, 6.28); rx.strokeStyle = 'rgba(255,150,180,.1)'; rx.lineWidth = 6; rx.stroke();
      if (p > 0) { rx.beginPath(); rx.arc(56, 56, 46, -Math.PI / 2, -Math.PI / 2 + 6.28 * p); const g = rx.createLinearGradient(10, 56, 102, 56); g.addColorStop(0, '#ff6eb5'); g.addColorStop(1, '#c084fc'); rx.strokeStyle = g; rx.lineWidth = 6; rx.lineCap = 'round'; rx.stroke(); }
    }
    drawRing(0);
    function sH(e) { e.preventDefault(); hActive = true; animH(); }
    function eH(e) { e.preventDefault(); hActive = false; cancelAnimationFrame(hRAF); hProg = 0; drawRing(0); document.getElementById('h-pct').textContent = ''; }
    function animH() {
      if (!hActive) return;
      hProg = Math.min(hProg + .013, 1); drawRing(hProg);
      const p = Math.round(hProg * 100);
      document.getElementById('h-pct').textContent = p < 40 ? 'Đang mở... 💕' : p < 80 ? 'Gần xong! ✨' : 'Mở ra thôi~ 🎊';
      if (hProg >= 1) { hActive = false; hProg = 0; drawRing(0); document.getElementById('h-pct').textContent = ''; openGift(); return; }
      hRAF = requestAnimationFrame(animH);
    }
    holdBtn.addEventListener('mousedown', sH); holdBtn.addEventListener('touchstart', sH, { passive: false });
    holdBtn.addEventListener('mouseup', eH); holdBtn.addEventListener('mouseleave', eH);
    holdBtn.addEventListener('touchend', eH); holdBtn.addEventListener('touchcancel', eH);

    // ═══════════════════════════════
    // OPEN GIFT
    // ═══════════════════════════════
    function openGift() {
      // Preload images from folder for this person
      preloadFolderImages(CP.key);
      fireworks(); startMusic();
      buildFloat(); buildSphere(); buildLetter();
      switchScreen('s-gift');
      currentScene = 0; gotoScene(0);
    }

    // ═══════════════════════════════
    // ── FLOAT SCENE ──
    // Infinite loop: each photo spawns, rises, loops back
    // ═══════════════════════════════
    let floatTimers = [];

    function buildFloat() {
      // Style the button
      const btn = document.getElementById('float-up-btn');
      btn.style.background = `linear-gradient(135deg,${CP.colors[0]},${CP.colors[2]})`;
      // Restart loops
      startFloatLoop();
    }

    // Track active float loop flag per person
    let floatLoopActive = false;
    let floatLoopKey = '';

    function startFloatLoop() {
      // Stop any previous loop
      floatLoopActive = false;
      floatTimers.forEach(t => clearTimeout(t)); floatTimers = [];
      const k = CP.key;
      const scene = document.getElementById('sc-float');
      scene.querySelectorAll('.fp').forEach(e => e.remove());

      const photos = FLOAT_BANK[k];
      if (photos.length === 0) return;

      floatLoopActive = true;
      floatLoopKey = k;

      // Stagger initial spawns so screen fills gradually
      const gap = Math.max(400, 2000 / photos.length);
      photos.forEach((src, idx) => {
        const t = setTimeout(() => {
          if (!floatLoopActive || floatLoopKey !== k) return;
          spawnFloatPhoto(scene, src, k);
        }, idx * gap);
        floatTimers.push(t);
      });
    }

    function spawnFloatPhoto(scene, src, key) {
      // Guard: stop if scene changed
      if (!floatLoopActive || floatLoopKey !== key) return;

      const el = document.createElement('div');
      el.className = 'fp';

      const vw = innerWidth;
      const wPct = Math.random() * 13 + 18;        // 18–31%
      const w = Math.round(vw * wPct / 100);
      const h = Math.round(w * 1.25);
      const maxLeft = Math.max(5, 96 - wPct);
      const left = (Math.random() * maxLeft + 2).toFixed(1);
      const rot = ((Math.random() - 0.5) * 22).toFixed(1);
      const durSec = Math.random() * 5 + 9;      // 9–14 s
      const durMs = Math.round(durSec * 1000);

      el.style.cssText = `width:${w}px;height:${h}px;left:${left}%;bottom:-${h + 10}px;--r:${rot}deg;`;
      el.style.animation = `riseLoop ${durSec.toFixed(1)}s linear forwards`;

      const img = document.createElement('img');
      img.src = src;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;pointer-events:none;display:block;';
      el.appendChild(img);

      el.addEventListener('click', e => { e.stopPropagation(); openLB(src); });

      scene.appendChild(el);

      // Use setTimeout (reliable on all mobile browsers) to loop
      const t = setTimeout(() => {
        if (el.parentNode) el.remove();
        // Re-spawn same photo after a short random rest
        const rest = Math.random() * 800 + 200;
        const t2 = setTimeout(() => spawnFloatPhoto(scene, src, key), rest);
        floatTimers.push(t2);
      }, durMs);
      floatTimers.push(t);
    }

    function addFloatPhotos(inp) {
      const k = CP.key;
      const files = [...inp.files];
      let loaded = 0;
      files.forEach(f => {
        const r = new FileReader();
        r.onload = e => {
          FLOAT_BANK[k].push(e.target.result);
          SPHERE_BANK[k].push(e.target.result);
          loaded++;
          if (loaded === files.length) {
            // Stop existing loop and restart with all photos
            floatLoopActive = false;
            floatTimers.forEach(t => clearTimeout(t)); floatTimers = [];
            startFloatLoop();
            if (currentScene === 1) rebuildSphereCanvas();
          }
        }; r.readAsDataURL(f);
      });
    }

    // ═══════════════════════════════
    // ── SPHERE SCENE ──
    // CSS 3D sphere with explode-to-grid
    // ═══════════════════════════════
    let sphereExploded = false;
    const SPHERE_EMOJIS = ['🌸','💕','✨','💗','🌺','🌟','💖','🦋','🌹','🌻'];

    function buildSphere() {
      sphereExploded = false;
      const wrap = document.getElementById('sphere-wrap');
      const grid = document.getElementById('sphere-grid');
      const backBtn = document.getElementById('back-sphere-btn');
      wrap.classList.remove('hidden');
      grid.classList.remove('show');
      grid.innerHTML = '';
      backBtn.classList.remove('show');
      populateSphereTiles();
    }

    function populateSphereTiles() {
      const container = document.getElementById('sphere-3d');
      container.innerHTML = '';
      const srcs = SPHERE_BANK[CP.key];
      const n = Math.max(srcs.length, 8); // minimum 8 tiles for visual fullness

      // Generate points on sphere using Fibonacci sphere distribution
      const totalTiles = Math.max(n, 20); // at least 20 tiles for solid look
      const R = 140; // sphere radius in px

      for (let i = 0; i < totalTiles; i++) {
        // Fibonacci sphere algorithm for even distribution
        const phi = Math.acos(1 - 2 * (i + 0.5) / totalTiles);
        const theta = Math.PI * (1 + Math.sqrt(5)) * i;

        const x = R * Math.sin(phi) * Math.cos(theta);
        const y = R * Math.sin(phi) * Math.sin(theta);
        const z = R * Math.cos(phi);

        const tile = document.createElement('div');
        tile.className = 'sphere-tile';

        // Calculate rotation to face outward
        const rotY = Math.atan2(x, z) * (180 / Math.PI);
        const rotX = -Math.asin(y / R) * (180 / Math.PI);

        tile.style.transform = `rotateY(${rotY}deg) rotateX(${rotX}deg) translateZ(${R}px)`;

        // Use image if available, otherwise colored placeholder
        const imgIdx = i % Math.max(srcs.length, 1);
        if (srcs.length > 0) {
          const img = document.createElement('img');
          img.src = srcs[imgIdx];
          img.draggable = false;
          tile.appendChild(img);
        } else {
          const ph = document.createElement('div');
          ph.className = 'tile-placeholder';
          ph.style.background = CP.colors[i % CP.colors.length] + '33';
          ph.textContent = SPHERE_EMOJIS[i % SPHERE_EMOJIS.length];
          tile.appendChild(ph);
        }

        // Set border color per person
        const bc = CP.key === 'me' ? 'rgba(255,110,181,.3)' : CP.key === 'ca' ? 'rgba(192,132,252,.3)' : 'rgba(245,158,11,.3)';
        tile.style.borderColor = bc;

        container.appendChild(tile);
      }
    }

    function explodeSphere() {
      if (sphereExploded) return;
      sphereExploded = true;

      const srcs = SPHERE_BANK[CP.key];
      if (srcs.length === 0) {
        showToast('Chưa có ảnh! Hãy thêm ảnh trước 📷');
        sphereExploded = false;
        return;
      }

      // Fireworks effect on explode
      if (CP) {
        const cx = innerWidth / 2, cy = innerHeight / 2;
        for (let i = 0; i < 30; i++) {
          spawnPart(cx + (Math.random() - 0.5) * 200, cy + (Math.random() - 0.5) * 200, CP.colors[Math.floor(Math.random() * CP.colors.length)]);
        }
      }

      // Hide sphere
      const wrap = document.getElementById('sphere-wrap');
      wrap.classList.add('hidden');

      // Build grid
      const grid = document.getElementById('sphere-grid');
      grid.innerHTML = '';
      grid.classList.add('show');

      srcs.forEach((src, i) => {
        const card = document.createElement('div');
        card.className = 'grid-photo exploding';
        card.style.animationDelay = `${i * 0.08}s`;

        const img = document.createElement('img');
        img.src = src;
        img.draggable = false;
        card.appendChild(img);

        card.addEventListener('click', (e) => {
          e.stopPropagation();
          openLB(src);
          spawnPart(e.clientX, e.clientY, CP.colors[0]);
        });

        grid.appendChild(card);
      });

      // Show back button
      document.getElementById('back-sphere-btn').classList.add('show');
    }

    function collapseSphere() {
      sphereExploded = false;
      const wrap = document.getElementById('sphere-wrap');
      const grid = document.getElementById('sphere-grid');
      const backBtn = document.getElementById('back-sphere-btn');

      grid.classList.remove('show');
      backBtn.classList.remove('show');

      setTimeout(() => {
        wrap.classList.remove('hidden');
        populateSphereTiles(); // refresh tiles in case new photos were added
      }, 300);
    }

    function addSpherePhotos(inp) {
      const k = CP.key;
      const files = [...inp.files];
      let loaded = 0;
      files.forEach(f => {
        const r = new FileReader();
        r.onload = e => {
          SPHERE_BANK[k].push(e.target.result);
          FLOAT_BANK[k].push(e.target.result);
          loaded++;
          if (loaded === files.length) {
            rebuildSphereCanvas();
            if (currentScene === 0) startFloatLoop();
          }
        }; r.readAsDataURL(f);
      });
    }

    function rebuildSphereCanvas() {
      // Rebuild the 3D sphere tiles
      if (sphereExploded) {
        // If grid is shown, also add new photos to grid
        const grid = document.getElementById('sphere-grid');
        const srcs = SPHERE_BANK[CP.key];
        // Only add new ones
        const existing = grid.querySelectorAll('.grid-photo').length;
        for (let i = existing; i < srcs.length; i++) {
          const card = document.createElement('div');
          card.className = 'grid-photo exploding';
          card.style.animationDelay = `${(i - existing) * 0.08}s`;
          const img = document.createElement('img');
          img.src = srcs[i];
          img.draggable = false;
          card.appendChild(img);
          card.addEventListener('click', (e) => {
            e.stopPropagation();
            openLB(srcs[i]);
            spawnPart(e.clientX, e.clientY, CP.colors[0]);
          });
          grid.appendChild(card);
        }
      } else {
        populateSphereTiles();
      }
    }

    // ═══════════════════════════════
    // LETTER
    // ═══════════════════════════════
    function buildLetter() {
      const p = CP;
      document.getElementById('ltr-to').textContent = p.to;
      document.getElementById('ltr-title').textContent = p.title;
      document.getElementById('ltr-body').innerHTML = p.body.replace(/\n/g, '<br>');
      document.getElementById('ltr-deco').textContent = p.deco;
      document.getElementById('ltr-from').textContent = p.from;
      ['me', 'ca', 'hai'].forEach(k => document.getElementById('lp-' + k).style.display = 'none');
      document.getElementById('lp-' + p.slot).style.display = 'block';

      // Auto-load specified image from LETTER_PHOTO config or first image from folder
      const files = IMAGE_FILES[p.key];
      if (files && files.length > 0) {
        // Use specified photo from LETTER_PHOTO config, or fallback to first image
        const photoFile = LETTER_PHOTO[p.key] || files[0];
        const src = `images/${p.key}/${photoFile}`;
        const img = document.getElementById('limg-' + p.key);
        img.src = src;
        img.classList.add('ld');
        document.getElementById('lph-' + p.key).classList.add('gone');
        // Make click on photo open lightbox instead of file picker
        const photoDiv = document.getElementById('lp-' + p.key);
        photoDiv.onclick = (e) => { e.stopPropagation(); openLB(src); };
      }
    }
    function loadLtrPhoto(inp, key) {
      const f = inp.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = e => {
        const img = document.getElementById('limg-' + key); img.src = e.target.result; img.classList.add('ld');
        document.getElementById('lph-' + key).classList.add('gone');
        FLOAT_BANK[key].push(e.target.result); SPHERE_BANK[key].push(e.target.result);
        startFloatLoop(); rebuildSphereCanvas();
      }; r.readAsDataURL(f);
    }

    // ═══════════════════════════════
    // SCENE NAV
    // ═══════════════════════════════
    const SCENE_IDS = ['sc-float', 'sc-sphere', 'sc-letter'];
    function gotoScene(i) {
      // Stop float loop if leaving float scene
      if (i !== 0) { floatLoopActive = false; floatTimers.forEach(t => clearTimeout(t)); floatTimers = []; }
      currentScene = i;
      SCENE_IDS.forEach((id, j) => document.getElementById(id).classList.toggle('active', j === i));
      document.querySelectorAll('.snd').forEach((d, j) => d.classList.toggle('on', j === i));
      document.getElementById('next-btn').textContent = i < 2 ? 'Tiếp theo →' : '🔄 Xem lại';
      if (i === 1) rebuildSphereCanvas();
      if (i === 0) startFloatLoop();
    }
    function nextScene() { currentScene < 2 ? gotoScene(currentScene + 1) : (gotoScene(0), fireworks()); }

    // ═══════════════════════════════
    // LIGHTBOX
    // ═══════════════════════════════
    function openLB(src) {
      document.getElementById('lb-img').src = src;
      document.getElementById('lb').classList.add('open');
    }
    function closeLB(e) {
      if (!e || e.target === document.getElementById('lb') || e.target === document.getElementById('lb-close'))
        document.getElementById('lb').classList.remove('open');
    }

    // ═══════════════════════════════
    // SCREEN SWITCH
    // ═══════════════════════════════
    function switchScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.add('off'));
      document.getElementById(id).classList.remove('off');
    }

    // ═══════════════════════════════
    // FIREWORKS
    // ═══════════════════════════════
    const fwc = document.getElementById('fw-cnv'), fwx = fwc.getContext('2d');
    fwc.width = innerWidth; fwc.height = innerHeight;
    window.addEventListener('resize', () => { fwc.width = innerWidth; fwc.height = innerHeight; initPC(); });
    let fwps = [];
    class FP { constructor(x, y, c) { this.x = x; this.y = y; this.c = c; const a = Math.random() * 6.28, s = Math.random() * 6 + 2; this.vx = Math.cos(a) * s; this.vy = Math.sin(a) * s; this.l = 1; this.d = Math.random() * .026 + .008; this.r = Math.random() * 2.5 + .6; } u() { this.x += this.vx; this.y += this.vy; this.vy += .09; this.vx *= .98; this.l -= this.d; } dr() { fwx.globalAlpha = this.l; fwx.beginPath(); fwx.arc(this.x, this.y, this.r, 0, 6.28); fwx.fillStyle = this.c; fwx.fill(); } }
    function fireworks() {
      const c = CP ? CP.colors : ['#ff6eb5', '#c084fc', '#ffd700'];
      for (let b = 0; b < 7; b++)setTimeout(() => { const x = Math.random() * fwc.width, y = Math.random() * fwc.height * .7, col = c[Math.floor(Math.random() * c.length)]; for (let i = 0; i < 60; i++)fwps.push(new FP(x, y, col)); }, b * 250);
    }
    (function afFW() { fwx.clearRect(0, 0, fwc.width, fwc.height); fwps = fwps.filter(p => p.l > 0); fwps.forEach(p => { p.u(); p.dr(); }); fwx.globalAlpha = 1; requestAnimationFrame(afFW); })();

    // ═══════════════════════════════
    // HEARTS ON CLICK
    // ═══════════════════════════════
    const HEM = ['❤️', '💕', '💗', '💖', '💝', '🌸', '✨', '💜', '🧡'];
    document.addEventListener('click', e => {
      if (e.target.closest('#s-pin,#s-hold,#hold-btn,input,#lb,#lb-close')) return;
      spawnHearts(e.clientX, e.clientY);
      if (CP) spawnPart(e.clientX, e.clientY, CP.colors[0]);
    });
    function spawnHearts(x, y) {
      for (let i = 0; i < 3; i++) {
        const h = document.createElement('div'); h.className = 'ch';
        h.textContent = HEM[Math.floor(Math.random() * HEM.length)];
        h.style.cssText = `left:${x + (Math.random() - .5) * 50}px;top:${y}px;font-size:${Math.random() * .5 + .9}rem;animation-delay:${i * .06}s;`;
        document.body.appendChild(h); setTimeout(() => h.remove(), 1200);
      }
    }

    // ═══════════════════════════════
    // TOAST
    // ═══════════════════════════════
    let toastT = null;
    function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('on'); clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('on'), 2500); }

    // ═══════════════════════════════
    // MUSIC (supports real audio file or synthesizer fallback)
    // ═══════════════════════════════
    let audioEl = null;
    let actx = null, mOn = false, mInt = null, nI = 0;
    const NS = [261.63, 293.66, 329.63, 349.23, 392, 440, 493.88, 523.25];
    const MEL = [0, 2, 4, 5, 7, 5, 4, 2, 0, 2, 4, 7, 4, 5, 2, 0, 4, 5, 7, 9, 7, 5, 4, 2];
    function pN(f, d, v) { if (!f || !isFinite(f)) return; const o = actx.createOscillator(), g = actx.createGain(); o.connect(g); g.connect(actx.destination); o.type = 'sine'; o.frequency.value = f; g.gain.setValueAtTime(0, actx.currentTime); g.gain.linearRampToValueAtTime(v, actx.currentTime + .05); g.gain.linearRampToValueAtTime(0, actx.currentTime + d - .04); o.start(); o.stop(actx.currentTime + d); }

    function startMusic() {
      if (mOn) return;
      // If a real music file is configured, use it
      if (MUSIC_FILE && MUSIC_FILE.length > 0) {
        if (!audioEl) {
          audioEl = new Audio('music/' + MUSIC_FILE);
          audioEl.loop = true;
          audioEl.volume = 0.5;
        }
        audioEl.play().catch(() => { });
      } else {
        // Fallback: synthesizer music
        if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
        mInt = setInterval(() => {
          const ni = MEL[nI % MEL.length];
          const f1 = NS[ni % NS.length];
          const f2 = NS[(ni + 2) % NS.length];
          pN(f1, .38, .06);
          setTimeout(() => pN(f2, .18, .025), 200);
          nI++;
        }, 420);
      }
      mOn = true;
      document.getElementById('mus').textContent = '🎶';
      document.getElementById('mus').classList.add('on');
    }

    function stopMusic() {
      if (audioEl) { audioEl.pause(); }
      clearInterval(mInt);
      mOn = false;
      document.getElementById('mus').textContent = '🎵';
      document.getElementById('mus').classList.remove('on');
    }

    document.getElementById('mus').addEventListener('click', () => mOn ? stopMusic() : startMusic());
    let mSt = false; document.addEventListener('click', () => { if (!mSt) { mSt = true; startMusic(); } }, { once: true });
  </script>
